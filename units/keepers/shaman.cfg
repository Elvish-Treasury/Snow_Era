#textdomain wesnoth-SE
[unit_type]
    id=SE_Elvish_Shaman
    name= _ "Young Fairy"
    race=elf
    gender=female
    image="units/elves-snow/shaman.png"
    hitpoints=25
    movement_type=woodland
    movement=5
    [defense]
        frozen=60 
    [/defense]
    [movement_costs]
        frozen=1 
    [/movement_costs]
    experience=45
    level=1
    alignment=neutral
    advances_to=SE_Elvish_Battle_Fairy
    cost=18
    usage=archer
    description= _ ""
    die_sound={SOUND_LIST:ELF_FEMALE_HIT}

    [attack]
        name=chill wave
        #textdomain wesnoth-units
        description=_"chill wave"
        icon=attacks/iceball.png
        type=cold
        range=ranged
        damage=6
        number=4
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]

    {DEFENSE_ANIM "units/elves-snow/shaman.png" "units/elves-snow/shaman.png" {SOUND_LIST:ELF_FEMALE_HIT} }
    
    [attack_anim]
        [filter_attack]
            name=chill wave
        [/filter_attack]

        {MISSILE_FRAME_CHILL_WAVE 0 -12}

        start_time=-450
        [frame]
            image="units/elves-snow/shaman.png"
            halo=halo/undead/dark-magic-[1~6].png:50
            halo_x,halo_y=0,-12
        [/frame]
        {SOUND:HIT_AND_MISS magic-dark.ogg magic-dark-miss.ogg -100}
    [/attack_anim]
[/unit_type]
