#textdomain wesnoth-SE
[unit_type]
    id=SE_Elvish_Shaman
    name= _ "Young Fairy"
    race=elf
    gender=female
    image="units/elves-snow/shaman.png"
    hitpoints=25
    movement_type=woodlandfloat
    movement=5
    [defense]
        frozen=60 
    [/defense]
    [movement_costs]
        frozen=1 
    [/movement_costs]
    experience=45
    level=1
    alignment=neutral
    advances_to=SE_Elvish_Battle_Fairy
    cost=18
    usage=archer
    description= _ ""
    die_sound={SOUND_LIST:ELF_FEMALE_HIT}

    [attack]
        name=chill wave
        #textdomain wesnoth-units
        description=_"chill wave"
        icon=attacks/iceball.png
        type=cold
        range=ranged
        damage=6
        number=4
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]

    {DEFENSE_ANIM "units/elves-snow/shaman.png" "units/elves-snow/shaman.png" {SOUND_LIST:ELF_FEMALE_HIT} }

    [defend]
        start_time=-126
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        [frame]
            image=units/elves-snow/shaman-flying.png:1,units/elves-snow/shaman-flying.png:250,units/elves-snow/shaman-flying.png:1
        [/frame]
        # Do not change to SOUND:HIT, this has to remain a hit_sound_frame
        [if]
            hit_sound_start_time=-25
            hits=hit
            [hit_sound_frame]
                sound={SOUND_LIST:ELF_FEMALE_HIT}
            [/hit_sound_frame]
        [/if]
    [/defend]

    [standing_anim]
        [frame]
            image="units/elves-snow/shaman.png:50"
        [/frame]
    [/standing_anim]
    [standing_anim]
        start_time=0
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        submerge=0.01
        [frame]
            image="units/elves-snow/shaman-flying.png"
            halo=halo/elven/shyde-stationary-halo[1~6].png:150
            y=1:255,0:150,-1:150,0:150
        [/frame]
    [/standing_anim]
    [movement_anim]
        start_time=0
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        submerge=0.01
        [frame]
            image="units/elves-snow/shaman-flying.png"
            halo=halo/elven/shyde-stationary-halo[1~6].png:150
        [/frame]
    [/movement_anim]
    
    [attack_anim]
        [filter_attack]
            name=chill wave
        [/filter_attack]

        {MISSILE_FRAME_CHILL_WAVE 0 -12}

        start_time=-450
        [frame]
            image="units/elves-snow/shaman.png"
            halo=halo/undead/dark-magic-[1~6].png:50
            halo_x,halo_y=0,-12
        [/frame]
        {SOUND:HIT_AND_MISS magic-dark.ogg magic-dark-miss.ogg -100}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=chill wave
        [/filter_attack]

        {MISSILE_FRAME_CHILL_WAVE 0 -12}

        start_time=-450
        terrain_type={DRAKE_UNWALKABLE_TERRAINS}
        [frame]
            image="units/elves-snow/shaman-flying.png"
            halo=halo/undead/dark-magic-[1~6].png:50
            halo_x,halo_y=0,-12
        [/frame]
        {SOUND:HIT_AND_MISS magic-dark.ogg magic-dark-miss.ogg -100}
    [/attack_anim]
[/unit_type]
